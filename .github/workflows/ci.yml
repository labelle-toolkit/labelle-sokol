name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  build-test:
    name: build + test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Install sokol system libs (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libgl1-mesa-dev libx11-dev \
            libxi-dev libxcursor-dev libsdl2-dev
      - name: Install SDL2 (macOS)
        if: runner.os == 'macOS'
        # The desktop gamepad source (labelle-sdl-gamepad) links SDL2; input.zig
        # links it on macOS too.
        run: brew install sdl2
      - name: Build + test
        run: zig build test
